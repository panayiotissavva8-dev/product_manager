<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodexa - Login</title>
    <link rel="stylesheet" href="/assets/css/login.css">
    <script type="module" src="/assets/js/login.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <h1>Welcome to Prodexa</h1>
        <h2>Login</h2>

        <label for="username">Username</label>
        <input type="text" id="username" required minlength="4" maxlength="10">

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" maxlength="20">

        <input id="sign" type="button" value="Sign In">
        <button class="secondary" id="register">Register</button>

        <address>
            Contact us: <a href="mailto:infoProdexa@gmail.com">infoProdexa@gmail.com</a>
            <br>
            <br>
             &copy; 2026 Northstack Ltd. All rights reserved.
        </address>
    </div>
</body>
</html>
