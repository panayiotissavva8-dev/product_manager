<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prodexa - View Products</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/view_products.css">
    <link rel="stylesheet" href="/assets/css/menu_bar.css">
     <script src="/assets/js/menu_bar.js" defer></script>
    <script type="module" src="/assets/js/view_products.js" defer></script>
    <script>
document.addEventListener("DOMContentLoaded", () => {
    const backBtn = document.getElementById("backBtn");
    const role = localStorage.getItem("role"); // role stored at login

    if (backBtn) {
        backBtn.addEventListener("click", () => {
            if (role === "Employee") {
                window.location.href = "/employee_dashboard";
            } else if (role === "Manager") {
                window.location.href = "/dashboard";
            } else {
                window.location.href = "/"; // fallback
            }
        });
    }
});
</script>
</head>
<body>

<div class="dashboard-container">
  <div class="top-buttons">
        <button class="back-btn" id="backBtn">Back</button>
        <button class="logout-btn" id="logoutBtn" type="submit">Logout</button>
    </div>
   

    <h1 class="dashboard-title">Products</h1>

    <!-- Products Table -->
    <table class="products-table" id="productsTable">
        <thead>
            <tr>
                <th>Code</th>
                <th>Brand</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Stock Alert</th>
                <th>Cost (€)</th>
                <th>Price (€)</th>
                <th>Discount (%)</th>
                <th>VAT (%)</th>
                <th>Total Price (€)</th>
            </tr>
        </thead>
        <tbody>
            <!-- JS will populate rows here -->
        </tbody>
    </table>

    <div class="dashboard-footer">
        &copy; 2026 Northstack Ltd. All rights reserved.
        
    </div>

</div>

</body>
</html>
