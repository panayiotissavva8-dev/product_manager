<!DOCTYPE html>
<html lang="en"><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodexa - View Users Audit</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/view_audit_users.css">
    <script type="module" src="/assets/js/view_audit_users.js" defer></script>
       <link rel="stylesheet" href="/assets/css/menu_bar.css">
     <script src="/assets/js/menu_bar.js" defer></script>
     <script>
document.addEventListener("DOMContentLoaded", () => {
    const backBtn = document.getElementById("backBtn");
    const role = localStorage.getItem("role"); // role stored at login

    if (backBtn) {
        backBtn.addEventListener("click", () => {
            if (role === "Employee") {
                window.location.href = "/employee_dashboard";
            } else if (role === "Manager") {
                window.location.href = "/dashboard";
            } else {
                window.location.href = "/"; // fallback
            }
        });
    }
});
</script>
</head>
<body>

<div class="dashboard-container">
  <div class="top-buttons">
        <button class="back-btn" id="backBtn">Back</button>
        <button class="logout-btn" id="logoutBtn" type="submit">Logout</button>
    </div>
   

    <h1 class="dashboard-title">Users Audit</h1>

    <!-- Products Table -->
    <table class="users-table" id="UsersTable">
        <thead>
            <tr>
                <th>Audit ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            <!-- JS will populate rows here -->
        </tbody>
    </table>

    <div class="dashboard-footer">
        &copy; 2026 Northstack Ltd. All rights reserved.
        
    </div>

</div>

</body>
</html>
</html>
