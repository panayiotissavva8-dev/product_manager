<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prodexa - Delete Sale</title>

    <link rel="stylesheet" href="/css/delete_sale.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="/js/delete_sale.js" defer></script>
       <link rel="stylesheet" href="/css/menu_bar.css">
     <script src="/js/menu_bar.js" defer></script>
</head>
<body>

<div class="page-wrapper">
    <div class="delete-card">

            <button id="backBtn" class="corner-btn left">Back</button>
        <button id="logoutBtn" class="corner-btn right danger">Logout</button>

        <h1>Delete Sale</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by sale code">
            <button id="searchBtn">Search</button>
        </div>

        <div id="saleForm" class="sale-form hidden">

            <div class="field">
                <label>Sale Code</label>
                <input type="text" id="sale_code" disabled>
            </div>

            <div class="field">
                <label>User</label>
                <input type="text" id="user" disabled>
            </div>

            <div class="field">
                <label>Customer</label>
                <input type="text" id="customer" disabled>
            </div>

            <div class="field">
                <label>Code</label>
                <input type="number" id="code" disabled>
            </div>

            <div class="field">
                <label>Brand</label>
                <input type="text" id="brand" disabled>
            </div>

            <div class="field">
                <label>Name</label>
                <input type="text" id="name" disabled>
            </div>

            <div class="field">
                <label>Quantity</label>
                <input type="number" step="0.01" id="quantity" disabled>
            </div>

             <div class="field">
                <label>Price</label>
                <input type="number" step="0.01" id="price" disabled>
            </div>

             <div class="field">
                <label>Discount</label>
                <input type="number" step="0.01" id="discount" disabled>
            </div>

            <div class="field">
                <label>VAT amount (%)</label>
                <input type="number" step="0.01" id="vat_amount" disabled>
            </div>

            <div class="field">
                <label>Total Price</label>
                <input type="number" step="0.01" id="total_price" disabled>
            </div>

            <div class="field">
                <label>Date</label>
                <input type="text" id="date" disabled>
            </div>


            <button id="deleteBtn" class="delete-btn">Delete Sale</button>

            <div>
                 <!---Footer--->
        <div class="dashboard-footer">
            &copy; 2026 Northstack Ltd. All rights reserved.
        </div>
            </div>

             
</div>

</body>
</html>
