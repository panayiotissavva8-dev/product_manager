<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Page</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/view_sales.css">
       <link rel="stylesheet" href="/assets/css/menu_bar.css">
     <script src="/assets/js/menu_bar.js" defer></script>
     <script>
document.addEventListener("DOMContentLoaded", () => {
    const backBtn = document.getElementById("backBtn");
    const role = localStorage.getItem("role"); // role stored at login

    if (backBtn) {
        backBtn.addEventListener("click", () => {
            if (role === "Employee") {
                window.location.href = "/employee_dashboard";
            } else if (role === "Manager") {
                window.location.href = "/dashboard";
            } else {
                window.location.href = "/"; // fallback
            }
        });
    }
});
</script>
</head>
<body>

<div class="dashboard-container">
 <div class="top-buttons">
        <button class="back-btn" id="backBtn">Back</button>
        <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
    </div>

    <h1 class="dashboard-title">Sales</h1>

    <table class="sales-table" id="salesTable">
        <thead>
            <tr>
                <th>Sale Code</th>
                <th>User</th>
                <th>Customer</th>
                <th>Code</th>
                <th>Brand</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Unit Price (€)</th>
                <th>Discount (%)</th>
                <th>VAT Amount (%)</th>
                <th>Total Price (€)</th>
                <th>Date(MM-DD-YYYY)</th>
            </tr>
        </thead>
        <tbody>
                <!-- JS will populate rows here -->
        </tbody>
    </table>

    <div class="sales-footer">
        &copy; 2026 Northstack Ltd. All rights reserved.

    </div>
    <script src="/js/view_sales.js"></script>

</div>

</body>
</html>
