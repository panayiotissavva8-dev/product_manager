<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prodexa - Delete Product</title>

    <link rel="stylesheet" href="/css/delete_product.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="/js/delete_product.js" defer></script>
       <link rel="stylesheet" href="/css/menu_bar.css">
     <script src="/js/menu_bar.js" defer></script>
     <script>
document.addEventListener("DOMContentLoaded", () => {
    const backBtn = document.getElementById("backBtn");
    const role = localStorage.getItem("role"); // role stored at login

    if (backBtn) {
        backBtn.addEventListener("click", () => {
            if (role === "Employee") {
                window.location.href = "/employee_dashboard";
            } else if (role === "Manager") {
                window.location.href = "/dashboard";
            } else {
                window.location.href = "/"; // fallback
            }
        });
    }
});
</script>
</head>
<body>

<div class="page-wrapper">
    <div class="delete-card">

            <button id="backBtn" class="corner-btn left">Back</button>
        <button id="logoutBtn" class="corner-btn right danger">Logout</button>

        <h1>Delete Product</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by product code or name">
            <button id="searchBtn">Search</button>
        </div>

        <div id="productForm" class="product-form hidden">

            <div class="field">
                <label>Code</label>
                <input type="text" id="code" disabled>
            </div>

            <div class="field">
                <label>Brand</label>
                <input type="text" id="brand" disabled>
            </div>

            <div class="field">
                <label>Name</label>
                <input type="text" id="name" disabled>
            </div>

            <div class="field">
                <label>Quantity</label>
                <input type="number" id="quantity" disabled>
            </div>

            <div class="field">
                <label>Stock Alert</label>
                <input type="number" id="stock_alert" disabled>
            </div>

            <div class="field">
                <label>Cost</label>
                <input type="number" step="0.01" id="cost" disabled>
            </div>

            <div class="field">
                <label>Price</label>
                <input type="number" step="0.01" id="price" disabled>
            </div>

             <div class="field">
                <label>Discount</label>
                <input type="number" step="0.01" id="discount" disabled>
            </div>

             <div class="field">
                <label>VAT</label>
                <input type="number" step="0.01" id="vat_amount" disabled>
            </div>


            <button id="deleteBtn" class="delete-btn">Delete Product</button>

            <div>
                 <!---Footer--->
        <div class="dashboard-footer">
            &copy; 2026 Northstack Ltd. All rights reserved.
        </div>
            </div>

             
</div>

</body>
</html>
